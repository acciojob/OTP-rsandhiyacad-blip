<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OTP Verification</title>

<style>
body{
  font-family: Arial, Helvetica, sans-serif;
  background:#f4f4f4;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:white;
  padding:40px;
  border-radius:10px;
  border:3px solid black;
  text-align:center;
  width:700px;
}

#verification_heading{
  font-size:28px;
  margin-bottom:10px;
}

#verification_subtext{
  color:#555;
  margin-bottom:30px;
}

.code-container{
  display:flex;
  justify-content:center;
  gap:15px;
}

.code{
  width:60px;
  height:70px;
  font-size:40px;
  text-align:center;
  border:1px solid #ccc;
  border-radius:5px;
}

.code:focus{
  outline:2px solid #007bff;
}
</style>
</head>

<body>

<div class="container">

<h2 id="verification_heading">Verify Your Account</h2>

<p id="verification_subtext">
We emailed you the six digit code to acciojpb@email.com Enter the code below to confirm your email address.
</p>

<div class="code-container">
<input type="text" maxlength="1" class="code">
<input type="text" maxlength="1" class="code">
<input type="text" maxlength="1" class="code">
<input type="text" maxlength="1" class="code">
<input type="text" maxlength="1" class="code">
<input type="text" maxlength="1" class="code">
</div>

</div>

<script>

const codes = document.querySelectorAll(".code");

codes.forEach((code, index) => {

  code.addEventListener("input", (e) => {
    const value = e.target.value;

    if(value.length === 1 && index < codes.length - 1){
      codes[index + 1].focus();
    }
  });

  code.addEventListener("keydown", (e) => {

    if(e.key === "Backspace"){
      if(code.value === "" && index > 0){
        codes[index - 1].focus();
      }
    }

  });

});

</script>

</body>
</html>
